site_name: Publications - Intranet CEN
site_url: https://github.com/Adam-DemersCEN/intranet-publications-member-docs/

theme:
  name: material
  logo: assets/logo_cen.svg
  favicon: assets/logo_cen.svg
  palette:
    primary: custom
    accent: custom

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - md_in_html

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Accueil: Home
            Guide d'utilisation: User Guide
            Accéder au module: Access the Module
            Créer: Create
            Modifier: Edit
            Importer depuis BibTeX: Import from BibTeX
            Importer depuis ORCID: Import from ORCID
            Rechercher: Search
            Exporter: Export
            Masquer: Hide
            FAQ: FAQ

nav:
  - Accueil: index.md
  - Guide d'utilisation:
    - Accéder au module: guide/access.md
    - Créer: guide/create.md
    - Modifier: guide/edit.md
    - Importer depuis BibTeX: guide/import-bibtex.md
    - Importer depuis ORCID: guide/import-orcid.md
    - Rechercher: guide/search.md
    - Exporter: guide/export.md
    - Masquer: guide/hide.md
  - FAQ: faq.md